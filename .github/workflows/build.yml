name: Build RTL8821AU for Nord 3
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Driver Source
        uses: actions/checkout@v4
        with:
          repository: morrownr/8821au-20210708
          path: driver

      - name: Install Toolchain
        run: |
          sudo apt update
          sudo apt install -y bc build-essential git gcc-arm-linux-gnueabi-64
          git clone https://android.googlesource.com --depth=1 clang-android

      - name: Download Nord 3 Kernel Headers
        run: |
          git clone https://github.com --depth=1 -b oneplus/mt6983_t_13.1_oneplus_nord_3_5g kernel

      - name: Patch Driver for USB ID 2357:0120
        run: |
          sed -i '/{USB_DEVICE(0x2357, 0x011E), .driver_info = RTL8821},/a \	{USB_DEVICE(0x2357, 0x0120), .driver_info = RTL8821},' driver/os_dep/linux/usb_intf.c

      - name: Build Module
        run: |
          cd driver
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make KSRC=../kernel CONFIG_PLATFORM_I386_PC=n CONFIG_PLATFORM_ANDROID_ARM64=y

      - name: Upload Driver Module
        uses: actions/upload-artifact@v4
        with:
          name: 8821au-driver
          path: driver/8821au.ko
